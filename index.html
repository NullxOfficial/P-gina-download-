<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sub9Unlock | Create Link</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --blue: #007bff; --red: #ff3e3e; --cyan: #00d4ff; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .logo { font-size: 26px; font-weight: 800; margin-bottom: 20px; text-decoration: none; }
        .logo span:first-child { color: var(--cyan); }
        .logo span:last-child { color: var(--red); }
        .v-bar { background: #000; border: 1px solid #30363d; padding: 8px 20px; border-radius: 50px; font-size: 13px; margin-bottom: 30px; color: #2ea043; }
        .input-group { background: white; width: 100%; max-width: 400px; border-radius: 12px; display: flex; padding: 12px; margin-bottom: 15px; box-sizing: border-box; }
        .input-group input { border: none; outline: none; width: 100%; font-size: 16px; color: #333; margin-left: 10px; }
        .btn { background: var(--blue); color: white; width: 100%; max-width: 400px; padding: 16px; border: none; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,123,255,0.3); }
        #result { display: none; margin-top: 20px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px dashed var(--cyan); }
    </style>
</head>
<body>
    <div class="logo"><span>SUB9</span><span>UNLOCK.COM</span></div>
    <div class="v-bar">● URL verification : www.sub9unlock.COM</div>
    <h1>Create Subscribe to Unlock Link</h1>
    <p style="color:#8b949e; margin-bottom:30px;">Turn Viewers Into Loyal Subscribers</p>

    <div class="input-group">
        <span>📺</span>
        <input type="text" id="yt" placeholder="Youtube Channel URL">
    </div>
    <div class="input-group">
        <span>🔒</span>
        <input type="text" id="dest" placeholder="URL Link To Lock">
    </div>

    <button class="btn" onclick="crear()">Generate Link</button>

    <div id="result">
        <p style="font-size:12px; margin:0;">TU CÓDIGO ID:</p>
        <h2 id="idOut" style="color:var(--cyan); margin:10px 0;"></h2>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBGObdEP8wfRYi-8G2mKhKY7DzCMy9yO28",
            authDomain: "sub9unlock.firebaseapp.com",
            projectId: "sub9unlock",
            storageBucket: "sub9unlock.firebasestorage.app",
            messagingSenderId: "302145973766",
            appId: "1:302145973766:web:e76ee2b72f15dfbb829d87"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.crear = async () => {
            const ytVal = document.getElementById('yt').value;
            const destVal = document.getElementById('dest').value;
            const idDoc = Math.random().toString(36).substring(2, 7).toUpperCase();

            if(!ytVal || !destVal) return alert("Completa los campos");

            try {
                await addDoc(collection(db, "Links"), {
                    id: idDoc,
                    canal_yt: ytVal,
                    url_final: destVal
                });
                document.getElementById('idOut').innerText = idDoc;
                document.getElementById('result').style.display = "block";
            } catch (e) { alert("Error al guardar en Firebase"); }
        }
    </script>
</body>
</html>
</html>
