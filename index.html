<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brusmods | Premium Templates</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #000000;
      --card-bg: #0a0a0a;
      --card-border: #1a1a1a;
      --text: #f1f1f1;
      --text-secondary: #a0a0a0;
      --accent: #ff2d55;
      --accent-dark: #c41e3b;       /* rojo más oscuro para el inicio del gradiente */
      --accent-glow: rgba(255, 45, 85, 0.20);
      --sidebar-width: 280px;
      --header-bg: #000000;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #particles { position:fixed; inset:0; z-index:-1; pointer-events:none; }

    /* Loader */
    #translation-loader {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.98);
      z-index: 9999;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 5px solid rgba(255,45,85,0.15);
      border-top: 5px solid var(--accent);
      border-radius: 50%;
      animation: spin 1.1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Header */
    header {
      background: var(--header-bg);
      backdrop-filter: blur(12px);
      padding: 14px 5%;
      display: flex;
      align-items: center;
      gap: 18px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #111;
    }

    .menu-trigger {
      font-size: 2.2rem;
      color: var(--accent);               /* rojo */
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 10px;
      transition: all 0.25s;
    }

    .menu-trigger:hover {
      background: rgba(255,45,85,0.15);
      transform: scale(1.08);
    }

    .logo-img { height: 40px; }

    /* Sidebar */
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      opacity: 0;
      visibility: hidden;
      transition: 0.4s;
      z-index: 1000;
    }

    .sidebar {
      position: fixed;
      top: 0; left: calc(-1 * var(--sidebar-width));
      width: var(--sidebar-width);
      height: 100%;
      background: #050505;
      border-right: 1px solid #111;
      z-index: 1001;
      transition: left 0.45s cubic-bezier(0.32,0.72,0,1);
      display: flex;
      flex-direction: column;
    }

    .sidebar.active { left: 0; }
    .sidebar-overlay.active { opacity: 1; visibility: visible; }

    .sidebar-header {
      padding: 22px 24px;
      display: flex;
      justify-content: flex-end;
      border-bottom: 1px solid #111;
    }

    .close-btn {
      font-size: 2.4rem;
      color: var(--accent);               /* rojo */
      cursor: pointer;
      transition: all 0.25s;
    }

    .close-btn:hover {
      color: #ff4d6a;                    /* rojo más claro al hover */
      transform: rotate(90deg);
    }

    .sidebar-menu {
      list-style: none;
      padding: 16px 0;
    }

    .sidebar-item {
      padding: 15px 28px;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.22s;
    }

    .sidebar-item:hover {
      color: var(--accent);
      background: rgba(255,45,85,0.08);
    }

    .sidebar-item.active-link {
      color: var(--accent);
      background: rgba(255,45,85,0.11);
      border-left: 4px solid var(--accent);
    }

    .extra-btns {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 20px;
    }

    .btn-side {
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      transition: all 0.3s;
      letter-spacing: 0.4px;
      color: white;
      background: linear-gradient(135deg, var(--accent-dark), var(--accent));  /* rojo oscuro → rojo vivo */
      box-shadow: 0 6px 20px rgba(255,45,85,0.35);
    }

    .btn-side:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 35px rgba(255,45,85,0.55);
      background: linear-gradient(135deg, #d91e44, #ff2d55); /* intensifica un poco más */
    }

    /* Contenido principal (mismo que antes, solo resumo para no alargar) */
    .container {
      max-width: 1140px;
      margin: 50px auto;
      padding: 0 20px;
    }

    .section-title {
      text-align: center;
      color: var(--text-secondary);
      font-size: 1.6rem;
      margin-bottom: 45px;
      font-weight: 500;
      letter-spacing: 1.2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--card-border);
      transition: all 0.35s ease;
      box-shadow: 0 12px 35px rgba(0,0,0,0.6);
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.7), 0 0 0 2px rgba(255,45,85,0.18);
    }

    .img-box {
      width: 100%;
      aspect-ratio: 16/9;
      background: #050505;
      overflow: hidden;
    }

    .img-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .card:hover .img-box img { transform: scale(1.08); }

    .card-info { padding: 22px 24px; }

    .card-info h3 {
      font-size: 1.3rem;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .card-info p {
      font-size: 0.92rem;
      color: var(--text-secondary);
      margin-bottom: 20px;
      line-height: 1.5;
      height: 3.2em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .dl-btn {
      display: block;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent-dark), var(--accent));
      color: #fff;
      text-align: center;
      font-weight: 700;
      border-radius: 12px;
      font-size: 0.98rem;
      transition: all 0.3s;
      box-shadow: 0 6px 20px var(--accent-glow);
    }

    .dl-btn:hover {
      background: linear-gradient(135deg, #d91e44, #ff2d55);
      transform: translateY(-3px);
      box-shadow: 0 12px 35px var(--accent-glow);
    }

    @media (max-width: 600px) {
      .grid { gap: 24px; }
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<div id="translation-loader">
  <div class="spinner"></div>
  <p style="margin-top:24px; color:var(--accent); font-weight:600; font-size:1.1rem;">Traduciendo página...</p>
</div>

<div class="sidebar-overlay" id="overlay"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="close-btn" id="closeMenu">✕</div>
  </div>
  
  <ul class="sidebar-menu">
    <li class="sidebar-item" onclick="changeLang('es')">Español 🇪🇸</li>
    <li class="sidebar-item" onclick="changeLang('en')">English 🇺🇸</li>
    <li class="sidebar-item active-link" id="menu-home" style="margin-top:20px;">Inicio</li>
  </ul>

  <div class="extra-btns">
    <a href="#" class="btn-side btn-donar" id="btn-donar">DONACIONES ❤️</a>
    <a href="#" class="btn-side btn-soporte" id="btn-soporte">SOPORTE 🛠️</a>
  </div>
</nav>

<header>
  <div class="menu-trigger" id="openMenu">☰</div>
  <div class="logo-area">
    <img src="tu-logo.png" alt="Brusmods" class="logo-img">
  </div>
</header>

<div class="container">
  <h1 class="section-title" id="main-title">Plantillas Premium</h1>

  <div class="grid">
    <div class="card">
      <div class="img-box"><img src="1.png" alt="Zay eCommerce"></div>
      <div class="card-info">
        <h3>Zay eCommerce</h3>
        <p class="t-desc" data-es="Blanco, Bootstrap, Comercio electrónico, Profesional..." data-en="White, Bootstrap, eCommerce, Professional...">Blanco, Bootstrap, Comercio electrónico, Profesional...</p>
        <a href="#" class="dl-btn">DESCARGAR</a>
      </div>
    </div>

    <div class="card">
      <div class="img-box"><img src="2.png" alt="Limelight Design"></div>
      <div class="card-info">
        <h3>Limelight Design</h3>
        <p class="t-desc" data-es="Minimalista, Agencias, Moderno..." data-en="Minimalist, Agency, Modern...">Minimalista, Agencias, Moderno...</p>
        <a href="#" class="dl-btn">DESCARGAR</a>
      </div>
    </div>
  </div>
</div>

<script>
// Traducciones (sin cambios)
const translations = {
  es: { loader:"Traduciendo página...", home:"Inicio", donate:"DONACIONES ❤️", support:"SOPORTE 🛠️", download:"DESCARGAR" },
  en: { loader:"Translating page...", home:"Home", donate:"DONATIONS ❤️", support:"SUPPORT 🛠️", download:"DOWNLOAD" }
};

function changeLang(lang) {
  const loader = document.getElementById('translation-loader');
  loader.style.display = 'flex';
  toggleMenu();

  setTimeout(() => {
    document.getElementById('main-title').textContent = translations[lang].home;
    document.getElementById('menu-home').textContent = translations[lang].home;
    document.getElementById('btn-donar').textContent = translations[lang].donate;
    document.getElementById('btn-soporte').textContent = translations[lang].support;
    document.querySelectorAll('.dl-btn').forEach(b => b.textContent = translations[lang].download);
    document.querySelectorAll('.t-desc').forEach(el => el.textContent = el.getAttribute(`data-${lang}`) || el.textContent);
    loader.style.display = 'none';
  }, 1200);
}

// Menú toggle
const open = document.getElementById('openMenu');
const close = document.getElementById('closeMenu');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');

function toggleMenu() {
  sidebar.classList.toggle('active');
  overlay.classList.toggle('active');
}

open.onclick = toggleMenu;
close.onclick = toggleMenu;
overlay.onclick = toggleMenu;

// Partículas conectadas (rojas) - sin cambios
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

function initParticles() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  particles = [];
  const num = Math.floor(canvas.width * canvas.height / 9000);
  for(let i = 0; i < num; i++){
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.6,
      vy: (Math.random() - 0.5) * 0.6,
      radius: Math.random() * 2.2 + 0.8
    });
  }
}

function drawParticles() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let i = 0; i < particles.length; i++){
    for(let j = i+1; j < particles.length; j++){
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if(dist < 140){
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(255,45,85,${(140 - dist)/140 * 0.18})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }
  }

  ctx.fillStyle = "rgba(255,45,85,0.9)";
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if(p.y < 0 || p.y > canvas.height) p.vy *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(drawParticles);
}

initParticles();
drawParticles();
window.onresize = () => { initParticles(); };
</script>
</body>
</html>
