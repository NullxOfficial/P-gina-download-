<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUB9UNLOCK.COM | Create Link</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e1a; --card: #151b2d; --blue: #007bff; --red: #ff0000; --cyan: #00f2ff; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 10px; text-align: center; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; }
        .logo { font-weight: 800; font-size: 22px; }
        .logo span:first-child { color: var(--cyan); }
        .logo span:last-child { color: var(--red); }

        .verification { background: #000; border: 1px solid #333; border-radius: 50px; padding: 10px 20px; display: inline-flex; align-items: center; margin: 20px 0; font-size: 14px; }
        
        h2 { font-size: 24px; margin: 10px 0; }
        p.subtitle { color: #a0aec0; margin-bottom: 30px; }

        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .tab-btn { padding: 10px 15px; border-radius: 25px; border: 1.5px solid; font-size: 12px; font-weight: bold; cursor: pointer; background: none; color: white; }
        .tab-red { border-color: var(--red); background: rgba(255,0,0,0.1); }
        .tab-cyan { border-color: var(--cyan); }

        .input-box { background: white; border-radius: 12px; display: flex; align-items: center; padding: 15px; margin: 15px auto; max-width: 400px; }
        .input-box input { border: none; width: 100%; outline: none; color: #333; font-size: 16px; margin-left: 10px; }

        .btn-generate { background: var(--blue); color: white; width: 100%; max-width: 400px; padding: 18px; border: none; border-radius: 12px; font-weight: 800; font-size: 18px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,123,255,0.4); margin-top: 10px; }
        
        #result { display: none; margin-top: 20px; padding: 15px; background: #1a2236; border-radius: 10px; border: 1px dashed var(--cyan); }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo"><span>SUB9</span><span>UNLOCK.COM</span></div>
        <div>☰</div>
    </div>

    <div class="verification">
        🔒 URL verification: www.sub9unlock.COM
    </div>

    <h2>Create Subscribe to Unlock Link</h2>
    <p class="subtitle">Turn Viewers Into Loyal Subscribers</p>

    <div class="tabs">
        <button class="tab-btn tab-red">▬ Subscribe</button>
        <button class="tab-btn tab-cyan">Like Video</button>
        <button class="tab-btn tab-cyan">More Option</button>
    </div>

    <div class="input-box">
        <span style="color: #999;">📺</span>
        <input type="text" id="urlYoutube" placeholder="Enter Youtube Channel URL">
    </div>

    <div class="input-box">
        <span style="color: #999;">🔒</span>
        <input type="text" id="urlDestino" placeholder="Enter URL Link To Lock">
    </div>

    <button class="btn-generate" onclick="crear()">Generate Link</button>

    <div id="result">
        <p>Your ID Code:</p>
        <h3 id="codigoID" style="color: var(--cyan); font-size: 28px;"></h3>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURACIÓN DE TU FIREBASE (Copia de tu captura)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "sub9unlock.firebaseapp.com",
            projectId: "sub9unlock",
            storageBucket: "sub9unlock.firebasestorage.app",
            messagingSenderId: "TU_ID_AQUÍ",
            appId: "TU_APP_ID_AQUÍ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.crear = async () => {
            const yt = document.getElementById('urlYoutube').value;
            const dest = document.getElementById('urlDestino').value;
            const idCorto = Math.random().toString(36).substring(2, 7).toUpperCase();

            if(!yt || !dest) return alert("Please fill all fields");

            try {
                await addDoc(collection(db, "Links"), {
                    id: idCorto,
                    canal_yt: yt,
                    url_final: dest
                });
                document.getElementById('codigoID').innerText = idCorto;
                document.getElementById('result').style.display = "block";
                alert("Link Created!");
            } catch (e) { alert("Error connecting to Firebase"); }
        }
    </script>
</body>
</html>
